<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search" />
    <title>Trabalho</title>
</head>

<body>

    <div class="layout">

        <!-- Sidebar -->
        <aside class="sidebar">

            <nav class="navigation">
                <ul class="navigation__list">

                    <li class="navigation__item">
                        <a href="#" class="navigation__link">Home</a>
                    </li>

                    <li class="navigation__item">
                        <a href="#" class="navigation__link">Sobre</a>
                    </li>

                    <li class="navigation__item">
                        <a href="#" class="navigation__link">Contato</a>
                    </li>

                </ul>
            </nav>

        </aside>

        <!-- Conteúdo principal -->
        <main class="content">

            <!-- Topo -->
            <header class="content__header">
                <div class="header_left">
                    <h1>Dashboard</h1>
                </div>
                <div class="header_right">
                    <div class="widget_search">
                        <input type="text">
                        <img src="svgs/search.svg" alt="icone_pesquisa">
                    </div>
                    <img src="svgs/notification.svg" alt="icone_notificacao">
                    <div class="widget-user-pic"></div>
                    
                </div>
            </header>

            <!-- Widgets -->
            <section class="widgets">

                <div class="widget-card">
                    <div class="widget-card__content"></div>
                </div>

                <div class="widget-card">
                    <div class="widget-card__content"></div>
                </div>

            </section>

        </main>

    </div>

</body>

</html>
