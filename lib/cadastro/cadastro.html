<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* HEADER */
header {
    background: #1d3557;
    color: white;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
}

header h1 {
    font-size: 20px;
}

header span {
    font-size: 14px;
}

/* FUNDO */
.main {
    flex: 1;
    background: url('https://images.unsplash.com/photo-1522778119026-d647f0596c20?q=80&w=1974&auto=format&fit=crop') center/cover no-repeat;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

/* CARD */
.container {
    position: relative;
    background: white;
    padding: 30px;
    width: 420px;
    border-radius: 15px;
    z-index: 1;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* CAMPOS */
h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #1d3557;
}

.input-group {
    margin-bottom: 12px;
}

label {
    font-size: 14px;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: #1d3557;
    color: white;
    border: none;
    border-radius: 8px;
    margin-top: 15px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #e63946;
}

/* BLOCOS LATERAIS */
.info-left, .info-right {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    color: white;
    width: 200px;
    font-size: 14px;
}

.info-left {
    left: 30px;
}

.info-right {
    right: 30px;
}

.info-box {
    background: rgba(0,0,0,0.6);
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
}

/* FOOTER */
footer {
    background: #111;
    color: #ccc;
    padding: 20px;
    text-align: center;
    font-size: 14px;
}

footer div {
    margin: 5px 0;
}

/* RESPONSIVO */
@media (max-width: 900px) {
    .info-left, .info-right {
        display: none;
    }
}
</style>
</head>

<body>

<header>
    <h1>⚽ SportShop</h1>
    <span>Os melhores produtos de futebol</span>
</header>

<div class="main">
    <div class="overlay"></div>

    <!-- INFORMAÇÕES ESQUERDA -->
    <div class="info-left">
        <div class="info-box">
            📍 Endereço:<br>
            Rua Exemplo, 123<br>
            São Paulo - SP
        </div>

        <div class="info-box">
            📞 Suporte:<br>
            (11) 99999-9999
        </div>
    </div>

    <!-- CADASTRO -->
    <div class="container">
        <h2>Cadastro</h2>

        <div class="input-group">
            <label>Nome completo</label>
            <input type="text" id="nome">
        </div>

        <div class="input-group">
            <label>CPF</label>
            <input type="text" id="cpf">
        </div>

        <div class="input-group">
            <label>Telefone</label>
            <input type="text" id="telefone">
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email">
        </div>

        <div class="input-group">
            <label>Endereço</label>
            <input type="text" id="endereco">
        </div>

        <div class="input-group">
            <label>Senha</label>
            <input type="password" id="senha">
        </div>

        <button onclick="cadastrar()">Cadastrar</button>
    </div>

    <!-- INFORMAÇÕES DIREITA -->
    <div class="info-right">
        <div class="info-box">
            🚚 Entrega para todo Brasil
        </div>

        <div class="info-box">
            🔒 Compra 100% segura
        </div>

        <div class="info-box">
            🔁 Troca garantida
        </div>
    </div>
</div>

<footer>
    <div>© 2026 SportShop</div>
    <div>Email: contato@sportshop.com</div>
    <div>Política de Privacidade | Termos de Uso</div>
</footer>

<script>
function cadastrar() {
    let usuario = {
        nome: document.getElementById("nome").value,
        cpf: document.getElementById("cpf").value,
        telefone: document.getElementById("telefone").value,
        email: document.getElementById("email").value,
        endereco: document.getElementById("endereco").value,
        senha: document.getElementById("senha").value
    };

    for (let campo in usuario) {
        if (usuario[campo] === "") {
            alert("Preencha todos os campos!");
            return;
        }
    }

    localStorage.setItem("usuario", JSON.stringify(usuario));

    alert("Cadastro realizado!");
    window.location.href = "../dashboard/dashboard.html";
}
</script>

</body>
</html>
